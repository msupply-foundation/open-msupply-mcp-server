name: Release MCPB

# Cross-builds the native binary for every supported platform, packs them into a
# single multi-platform MCPB bundle, and attaches it to the GitHub Release.
#
# - macOS binary is a universal (arm64 + x86_64) fat binary via `lipo`.
# - Linux and Windows ship x86_64 (MCPB has no arch-level dispatch, so one binary
#   per OS; x64 is the redistribution convention — see scripts/build-mcpb.sh).
#
# Runs when a Release is published; also runnable on demand via workflow_dispatch
# (which just uploads the bundle as a workflow artifact, no release upload).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # required to upload the bundle as a release asset

env:
  BIN: omsupply-mcp-server

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            os: macos-14
          - platform: linux
            os: ubuntu-latest
          - platform: win32
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # macOS — build both arches and fuse into a universal binary.
      - name: Build (macOS universal)
        if: matrix.platform == 'darwin'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output "dist/$BIN" \
            "target/aarch64-apple-darwin/release/$BIN" \
            "target/x86_64-apple-darwin/release/$BIN"
          chmod +x "dist/$BIN"

      - name: Build (Linux x64)
        if: matrix.platform == 'linux'
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp "target/x86_64-unknown-linux-gnu/release/$BIN" "dist/$BIN"
          chmod +x "dist/$BIN"

      - name: Build (Windows x64)
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          mkdir -p dist
          cp "target/x86_64-pc-windows-msvc/release/$BIN.exe" "dist/$BIN.exe"

      - name: Upload platform binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform }}
          path: dist/
          if-no-files-found: error

  pack:
    name: Pack & publish MCPB
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: ${{ runner.temp }}/staging

      # Lay the binaries out exactly as manifest.json's platform_overrides expect.
      - name: Assemble bin/
        run: |
          mkdir -p bin/darwin bin/linux bin/win32
          cp "${{ runner.temp }}/staging/bin-darwin/$BIN" bin/darwin/$BIN
          cp "${{ runner.temp }}/staging/bin-linux/$BIN"  bin/linux/$BIN
          cp "${{ runner.temp }}/staging/bin-win32/$BIN.exe" bin/win32/$BIN.exe
          chmod +x bin/darwin/$BIN bin/linux/$BIN

      # Cargo.toml is the single source of truth for the version.
      - name: Sync manifest version from Cargo.toml
        run: |
          VERSION="$(grep -m1 '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VERSION" ]; then echo "could not read version from Cargo.toml" >&2; exit 1; fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          python3 - "$VERSION" <<'PY'
          import json, sys
          version = sys.argv[1]
          with open("manifest.json") as f:
              manifest = json.load(f)
          manifest["version"] = version
          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install mcpb CLI
        run: npm i -g @anthropic-ai/mcpb

      - name: Pack MCPB
        run: |
          OUT="open-msupply-${VERSION}.MCPB"
          mcpb pack . "$OUT"
          echo "BUNDLE=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-msupply-mcpb
          path: ${{ env.BUNDLE }}
          if-no-files-found: error

      - name: Attach bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$BUNDLE" --clobber
