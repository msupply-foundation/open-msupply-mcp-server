name: Release MCPB

# Cross-builds the native binary for every supported platform, packs them into a
# single multi-platform MCPB bundle, and publishes it as a GitHub Release.
#
# - macOS binary is a universal (arm64 + x86_64) fat binary via `lipo`.
# - Linux and Windows ship x86_64 (MCPB has no arch-level dispatch, so one binary
#   per OS; x64 is the redistribution convention — see scripts/build-mcpb.sh).
#
# Push a `v*.*.*` tag (e.g. v0.3.0) to build and publish that release — the
# workflow creates the GitHub Release and attaches the bundle. The tag must match
# the version in Cargo.toml. Also runnable on demand via workflow_dispatch, which
# just uploads the bundle as a workflow artifact (no release).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish a GitHub Release for the current Cargo.toml version (tag vX.Y.Z at the dispatched ref). Leave unchecked to only build the bundle artifact.'
        type: boolean
        default: false

permissions:
  contents: write # required to upload the bundle as a release asset

env:
  BIN: omsupply-mcp-server

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            os: macos-14
          - platform: linux
            os: ubuntu-latest
          - platform: win32
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      # rustup is preinstalled on GitHub-hosted runners; the org Actions policy
      # disallows third-party toolchain actions, so set it up directly.
      - name: Ensure Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version

      # macOS — build both arches and fuse into a universal binary.
      - name: Build (macOS universal)
        if: matrix.platform == 'darwin'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output "dist/$BIN" \
            "target/aarch64-apple-darwin/release/$BIN" \
            "target/x86_64-apple-darwin/release/$BIN"
          chmod +x "dist/$BIN"

      - name: Build (Linux x64)
        if: matrix.platform == 'linux'
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          mkdir -p dist
          cp "target/x86_64-unknown-linux-gnu/release/$BIN" "dist/$BIN"
          chmod +x "dist/$BIN"

      - name: Build (Windows x64)
        if: matrix.platform == 'win32'
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
          mkdir -p dist
          cp "target/x86_64-pc-windows-msvc/release/$BIN.exe" "dist/$BIN.exe"

      - name: Upload platform binary
        uses: actions/upload-artifact@v5
        with:
          name: bin-${{ matrix.platform }}
          path: dist/
          if-no-files-found: error

  pack:
    name: Pack & publish MCPB
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download platform binaries
        uses: actions/download-artifact@v5
        with:
          pattern: bin-*
          path: ${{ runner.temp }}/staging

      # Lay the binaries out exactly as manifest.json's platform_overrides expect.
      - name: Assemble bin/
        run: |
          mkdir -p bin/darwin bin/linux bin/win32
          cp "${{ runner.temp }}/staging/bin-darwin/$BIN" bin/darwin/$BIN
          cp "${{ runner.temp }}/staging/bin-linux/$BIN"  bin/linux/$BIN
          cp "${{ runner.temp }}/staging/bin-win32/$BIN.exe" bin/win32/$BIN.exe
          chmod +x bin/darwin/$BIN bin/linux/$BIN

      # Cargo.toml is the single source of truth for the version.
      - name: Sync manifest version from Cargo.toml
        run: |
          VERSION="$(grep -m1 '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ -z "$VERSION" ]; then echo "could not read version from Cargo.toml" >&2; exit 1; fi
          # On a tag push, the tag must match the crate version so the bundle
          # name and release tag can never drift apart.
          if [ "${{ github.ref_type }}" = "tag" ] && [ "${{ github.ref_name }}" != "v${VERSION}" ]; then
            echo "tag ${{ github.ref_name }} does not match Cargo.toml version v${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # The release tag: the pushed tag, or vX.Y.Z derived from Cargo.toml
          # for a dispatch-driven publish.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"
          fi
          python3 - "$VERSION" <<'PY'
          import json, sys
          version = sys.argv[1]
          with open("manifest.json") as f:
              manifest = json.load(f)
          manifest["version"] = version
          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install mcpb CLI
        run: npm i -g @anthropic-ai/mcpb

      - name: Pack MCPB
        run: |
          OUT="open-msupply-${VERSION}.MCPB"
          mcpb pack . "$OUT"
          echo "BUNDLE=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: open-msupply-mcpb
          path: ${{ env.BUNDLE }}
          if-no-files-found: error

      # Publishes the GitHub Release: on a tag push, or on a dispatch with
      # publish=true. Uses the preinstalled `gh` CLI (the org Actions policy
      # disallows third-party release actions). Creates the release/tag if
      # absent (tag at the checked-out commit), otherwise re-uploads the asset.
      # A plain dispatch (publish=false) stops after the artifact above.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$BUNDLE" --clobber
          else
            gh release create "$RELEASE_TAG" "$BUNDLE" \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
